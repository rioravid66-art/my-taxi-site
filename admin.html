<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CarBet - Admin Kontrol Mərkəzi</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
    * { font-family: 'Inter', sans-serif; }
    
    body { 
      background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%);
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
    }
    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    
    .glass { 
      background: rgba(15, 23, 42, 0.97); 
      backdrop-filter: blur(40px); 
      border: 1px solid rgba(16, 185, 129, 0.2);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
    }
    .gradient-text { 
      background: linear-gradient(135deg, #10b981, #34d399, #6ee7b7);
      -webkit-background-clip: text; 
      -webkit-text-fill-color: transparent; 
      background-clip: text; 
    }
    .status-pending { background: linear-gradient(90deg, #f59e0b, #fbbf24); }
    .status-approved { background: linear-gradient(90deg, #10b981, #34d399); }
    .pulse-glow { animation: pulseGlow 2s infinite; }
    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 0 20px rgba(16, 185, 129, 0.3); }
      50% { box-shadow: 0 0 40px rgba(16, 185, 129, 0.6); }
    }
  </style>
</head>
<body class="min-h-screen p-6 lg:p-12">

  <!-- 🔐 LOGIN SCREEN -->
  <div id="loginScreen" class="glass max-w-2xl mx-auto p-16 lg:p-24 rounded-4xl text-center">
    <div class="w-32 h-32 bg-gradient-to-r from-emerald-500 via-teal-500 to-emerald-600 rounded-4xl flex items-center justify-center mx-auto mb-12 shadow-3xl pulse-glow">
      <i class="fas fa-shield-alt text-5xl text-white"></i>
    </div>
    <h1 class="text-5xl lg:text-6xl font-black gradient-text mb-8 leading-tight">CarBet Kontrol Mərkəzi</h1>
    <p class="text-2xl text-gray-300 mb-16 lg:mb-20 leading-relaxed max-w-2xl mx-auto">
      Yalnız sistem administratoru girişi
    </p>
    
    <div class="space-y-6">
      <input id="adminPassword" type="password" 
             placeholder="🔐 Master Admin Şifrəsi"
             class="w-full p-8 lg:p-10 bg-zinc-900/70 border-3 border-gray-600 rounded-4xl text-3xl lg:text-4xl font-bold text-center text-white tracking-wider focus:border-emerald-500 focus:outline-none transition-all duration-300 hover:border-emerald-400">
      
      <div class="grid grid-cols-2 gap-4">
        <button onclick="checkAdminLogin()" 
                class="bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-600 hover:to-teal-700 text-white py-8 px-12 rounded-4xl text-2xl font-black shadow-3xl hover:shadow-emerald-500/50 transition-all duration-300 flex items-center justify-center group">
          <i class="fas fa-lock-open text-3xl mr-4 group-hover:animate-bounce"></i>
          Giriş
        </button>
        <button onclick="togglePassword()" 
                class="border-3 border-purple-500 hover:bg-purple-500 hover:border-purple-600 text-purple-400 hover:text-white py-8 px-12 rounded-4xl text-2xl font-black shadow-2xl hover:shadow-purple-500/50 transition-all duration-300 flex items-center justify-center">
          <i class="fas fa-eye text-3xl mr-4"></i>
          Göstər
        </button>
      </div>
      
      <div class="text-xs text-gray-500 uppercase tracking-wider font-bold opacity-0" id="errorMsg">
        ❌ Yanlış şifrə!
      </div>
    </div>
  </div>

  <!-- 💼 ADMIN DASHBOARD -->
  <div id="adminDashboard" class="glass max-w-7xl mx-auto p-12 lg:p-20 rounded-4xl hidden">
    
    <!-- Header -->
    <div class="flex flex-col lg:flex-row justify-between items-start lg:items-center mb-16 lg:mb-24 gap-8">
      <div>
        <h1 class="text-6xl lg:text-7xl font-black gradient-text mb-6">Kontrol Mərkəzi</h1>
        <div class="flex items-center space-x-6 text-2xl text-emerald-400 font-bold">
          <div class="flex items-center space-x-3">
            <div class="w-6 h-6 bg-emerald-400 rounded-full animate-ping"></div>
            <span>Online</span>
          </div>
          <span>|</span>
          <span id="sessionTime">00:00:00</span>
        </div>
      </div>
      <div class="flex items-center space-x-4">
        <button onclick="refreshData()" 
                class="bg-gradient-to-r from-blue-500 to-blue-600 hover:from-blue-600 hover:to-blue-700 text-white px-8 py-4 rounded-3xl font-bold shadow-2xl hover:shadow-blue-500/50 transition-all flex items-center">
          <i class="fas fa-sync-alt mr-2 animate-spin"></i>Yenilə
        </button>
        <button onclick="logout()" 
                class="bg-gradient-to-r from-red-500 to-red-600 hover:from-red-600 hover:to-red-700 text-white px-8 py-4 rounded-3xl font-bold shadow-2xl hover:shadow-red-500/50 transition-all flex items-center">
          <i class="fas fa-sign-out-alt mr-2"></i>Çıxış
        </button>
      </div>
    </div>

    <!-- 📊 STATS DASHBOARD -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8 mb-16">
      <div class="glass p-10 rounded-3xl hover:shadow-emerald-500/30 transition-all text-center group" id="pendingCount">
        <i class="fas fa-clock text-5xl text-yellow-400 mb-6 group-hover:animate-bounce"></i>
        <div class="text-5xl font-black text-yellow-400 mb-2" id="pendingNum">0</div>
        <div class="text-xl font-bold text-gray-300">Gözləyən Depozit</div>
      </div>
      <div class="glass p-10 rounded-3xl hover:shadow-emerald-500/30 transition-all text-center group">
        <i class="fas fa-wallet text-5xl text-emerald-400 mb-6"></i>
        <div class="text-5xl font-black text-emerald-400 mb-2" id="totalBalance">0.00</div>
        <div class="text-xl font-bold text-gray-300">Ümumi Balans</div>
      </div>
      <div class="glass p-10 rounded-3xl hover:shadow-emerald-500/30 transition-all text-center group">
        <i class="fas fa-exchange-alt text-5xl text-blue-400 mb-6 group-hover:rotate-180"></i>
        <div class="text-5xl font-black text-blue-400 mb-2" id="totalTransactions">0</div>
        <div class="text-xl font-bold text-gray-300">Tranzaksiya</div>
      </div>
      <div class="glass p-10 rounded-3xl hover:shadow-emerald-500/30 transition-all text-center group">
        <i class="fas fa-users text-5xl text-purple-400 mb-6"></i>
        <div class="text-5xl font-black text-purple-400 mb-2" id="totalUsers">0</div>
        <div class="text-xl font-bold text-gray-300">Aktiv İstifadəçi</div>
      </div>
    </div>

    <!-- 📋 PENDING DEPOZİTLƏR -->
    <div class="glass p-12 rounded-4xl mb-16">
      <h2 class="text-4xl font-black text-white mb-12 flex items-center">
        <i class="fas fa-hourglass-half text-5xl text-yellow-400 mr-6"></i>
        Gözləyən Depozitlər
      </h2>
      <div id="pendingList" class="space-y-6 min-h-[400px]">
        <!-- Dinamik yüklənəcək -->
      </div>
    </div>

    <!-- 📈 SON TRANZAKSİYALAR -->
    <div class="glass p-12 rounded-4xl">
      <h2 class="text-4xl font-black text-white mb-12 flex items-center">
        <i class="fas fa-history text-5xl text-indigo-400 mr-6"></i>
        Son Tranzaksiyalar
      </h2>
      <div id="recentTransactions" class="space-y-4">
        <!-- Dinamik yüklənəcək -->
      </div>
    </div>
  </div>

  <script>
    // 🔥 ULTRA GÜVƏNLİ ADMIN ŞİFRƏSİ (DƏYİŞDİR!)
    const ADMIN_PASSWORD = 'CarBetMaster2026$'; // ← YENİ ŞİFRƏ!
    
    let sessionStart = null;
    let loginAttempts = 0;

    // 🔐 ŞİFRƏ GÖZATLAMA
    function togglePassword() {
      const input = document.getElementById('adminPassword');
      input.type = input.type === 'password' ? 'text' : 'password';
    }

    // 🔐 ADMIN GİRİŞİ
    function checkAdminLogin() {
      const input = document.getElementById('adminPassword').value;
      const errorMsg = document.getElementById('errorMsg');
      
      if (input === ADMIN_PASSWORD) {
        localStorage.setItem('adminLoggedIn', btoa(Date.now().toString())); // Encrypted session
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('adminDashboard').classList.remove('hidden');
        sessionStart = Date.now();
        updateSessionTime();
        setInterval(updateSessionTime, 1000);
        loadDashboardData();
        return;
      }
      
      // Yanlış şifrə
      loginAttempts++;
      errorMsg.classList.remove('opacity-0');
      document.getElementById('adminPassword').style.borderColor = '#ef4444';
      
      setTimeout(() => {
        document.getElementById('adminPassword').style.borderColor = '#4b5563';
        errorMsg.classList.add('opacity-0');
      }, 2000);
      
      if (loginAttempts >= 3) {
        setTimeout(() => location.reload(), 5000);
      }
    }

    // 🚪 ÇIXIŞ
    function logout() {
      localStorage.removeItem('adminLoggedIn');
      sessionStart = null;
      document.getElementById('adminDashboard').classList.add('hidden');
      document.getElementById('loginScreen').classList.remove('hidden');
      document.getElementById('adminPassword').value = '';
    }

    // 📊 DASHBOARD YÜKLƏ
    function loadDashboardData() {
      loadPendingDeposits();
      loadRecentTransactions();
      updateStats();
    }

    // ⏰ SESSION VAXTI
    function updateSessionTime() {
      if (!sessionStart) return;
      const now = Date.now();
      const diff = Math.floor((now - sessionStart) / 1000);
      const hours = Math.floor(diff / 3600);
      const minutes = Math.floor((diff % 3600) / 60);
      const seconds = diff % 60;
      document.getElementById('sessionTime').textContent = 
        `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
    }

    // 🔥 PENDING DEPOZİTLƏR YÜKLƏ
    function loadPendingDeposits() {
      const pendingDeposits = JSON.parse(localStorage.getItem('pendingDeposits')) || [];
      const listEl = document.getElementById('pendingList');
      
      if (pendingDeposits.length === 0) {
        listEl.innerHTML = `
          <div class="text-center py-24">
            <i class="fas fa-check-circle text-9xl text-emerald-400 mb-12 opacity-60"></i>
            <h3 class="text-4xl font-black text-emerald-400 mb-4">Bütün depozitlər təsdiqlənib! ✅</h3>
            <p class="text-2xl text-gray-400">Yeni depozit gözlənilir...</p>
          </div>
        `;
        return;
      }

      listEl.innerHTML = pendingDeposits.map((deposit, index) => `
        <div class="glass p-10 rounded-4xl border-l-8 border-yellow-400 hover:shadow-yellow-400/50 transition-all group cursor-pointer hover:-translate-y-2" data-deposit-id="${deposit.id}">
          <div class="flex flex-col lg:flex-row justify-between items-start lg:items-center gap-8">
            <div class="flex items-start space-x-8 flex-1">
              <div class="w-24 h-24 status-pending rounded-3xl flex items-center justify-center shadow-2xl flex-shrink-0">
                <i class="fas fa-clock text-3xl text-white"></i>
              </div>
              <div class="flex-1 min-w-0">
                <h3 class="text-4xl font-black text-yellow-400 mb-4 truncate">${deposit.amount.toLocaleString()} <span class="text-2xl">AZN</span></h3>
                <div class="space-y-2">
                  <p class="text-xl font-bold text-white">ID: <span class="font-mono bg-black/30 px-4 py-2 rounded-2xl text-sm">${deposit.id}</span></p>
                  <p class="text-lg text-gray-300">İstifadəçi: <span class="font-bold text-white">${deposit.userId}</span></p>
                  <p class="text-lg text-gray-400">${new Date(deposit.timestamp).toLocaleString('az-AZ', { 
                    year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' 
                  })}</p>
                </div>
              </div>
            </div>
            <div class="flex flex-col sm:flex-row gap-4 pt-2 lg:pt-0">
              <button onclick="approveDeposit('${deposit.id}', ${deposit.amount}, '${deposit.userId}')"
                      class="flex-1 bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-600 hover:to-teal-700 text-white py-6 px-12 rounded-3xl font-black text-xl shadow-3xl hover:shadow-emerald-500/50 transition-all flex items-center justify-center">
                <i class="fas fa-check-circle mr-3 text-2xl"></i>Təsdiq et
              </button>
              <button onclick="rejectDeposit('${deposit.id}')"
                      class="flex-1 bg-gradient-to-r from-red-500 to-red-600 hover:from-red-600 hover:to-red-700 text-white py-6 px-12 rounded-3xl font-bold text-xl shadow-3xl hover:shadow-red-500/50 transition-all flex items-center justify-center">
                <i class="fas fa-times-circle mr-3 text-2xl"></i>Rədd et
              </button>
            </div>
          </div>
        </div>
      `).join('');
    }

    // 📈 STATİSTİKA YENİLƏ
    function updateStats() {
      const pendingDeposits = JSON.parse(localStorage.getItem('pendingDeposits')) || [];
      const transactions = JSON.parse(localStorage.getItem('transactions')) || [];
      const balance = parseFloat(localStorage.getItem('balance')) || 0;
      
      document.getElementById('pendingNum').textContent = pendingDeposits.length;
      document.getElementById('totalBalance').textContent = balance.toLocaleString();
      document.getElementById('totalTransactions').textContent = transactions.length;
      document.getElementById('totalUsers').textContent = new Set([...pendingDeposits.map(d=>d.userId), ...transactions.map(t=>t.userId || 'anon')]).size;
    }

    // ✅ TƏSDİQ ET – REAL BALANS!
    function approveDeposit(depositId, amount, userId) {
      // Pending sil
      let pendingDeposits = JSON.parse(localStorage.getItem('pendingDeposits')) || [];
      pendingDeposits = pendingDeposits.filter(d => d.id !== depositId);
      localStorage.setItem('pendingDeposits', JSON.stringify(pendingDeposits));
      
      // 🔥 REAL BALANSA ƏLAVƏ ET
      const balance = parseFloat(localStorage.getItem('balance')) || 0;
      const newBalance = balance + amount;
      localStorage.setItem('balance', newBalance.toFixed(2));
      
      // Tranzaksiya qeyd
      const transactions = JSON.parse(localStorage.getItem('transactions')) || [];
      transactions.unshift({
        type: 'deposit_approved',
        amount: amount,
        depositId: depositId,
        userId: userId,
        status: 'success',
        date: new Date().toLocaleString('az-AZ'),
        adminConfirmed: true
      });
      localStorage.setItem('transactions', JSON.stringify(transactions.slice(0, 100))); // Son 100 saxla
      
      // Yenilə
      loadDashboardData();
      
      // Uğurlu mesaj
      showNotification(`✅ ${amount.toLocaleString()} AZN təsdiq edildi!\nYeni balans: ${newBalance.toLocaleString()} AZN`, 'success');
    }

    // ❌ RƏDD ET
    function rejectDeposit(depositId) {
      let pendingDeposits = JSON.parse(localStorage.getItem('pendingDeposits')) || [];
      pendingDeposits = pendingDeposits.filter(d => d.id !== depositId);
      localStorage.setItem('pendingDeposits', JSON.stringify(pendingDeposits));
      
      loadDashboardData();
      showNotification('❌ Depozit rədd edildi!', 'error');
    }

    // 🔔 NOTİFİKASİYA
    function showNotification(message, type = 'info') {
      const notification = document.createElement('div');
      notification.className = `glass fixed top-6 right-6 p-8 rounded-3xl text-white shadow-3xl z-[10000] transform translate-x-full transition-all duration-500 ${
        type === 'success' ? 'bg-emerald-500/90 border-emerald-400/50' :
        type === 'error' ? 'bg-red-500/90 border-red-400/50' : 'bg-blue-500/90 border-blue-400/50'
      }`;
      notification.innerHTML = `
        <div class="flex items-center space-x-4">
          <i class="fas fa-${type === 'success' ? 'check-circle' : type === 'error' ? 'times-circle' : 'info-circle'} text-3xl"></i>
          <div>${message}</div>
        </div>
      `;
      document.body.appendChild(notification);
      
      setTimeout(() => notification.classList.remove('translate-x-full'), 100);
      setTimeout(() => {
        notification.classList.add('translate-x-full');
        setTimeout(() => notification.remove(), 500);
      }, 4000);
    }

    // 🔄 YENILƏ
    function refreshData() {
      loadDashboardData();
      showNotification('📊 Bütün məlumatlar yeniləndi!', 'info');
    }

    // SON TRANZAKSİYALAR
    function loadRecentTransactions() {
      const transactions = JSON.parse(localStorage.getItem('transactions')) || [];
      const recent = transactions.slice(0, 10).reverse();
      
      document.getElementById('recentTransactions').innerHTML = recent.map(t => `
        <div class="flex items-center justify-between p-6 bg-zinc-900/50 rounded-3xl hover:bg-zinc-800/50 transition-all">
          <div class="flex items-center space-x-6">
            <div class="w-16 h-16 ${t.status === 'success' ? 'bg-emerald-500/20 border-4 border-emerald-500 text-emerald-400' : 'bg-red-500/20 border-4 border-red-500 text-red-400'} rounded-2xl flex items-center justify-center">
              <i class="fas fa-${t.type.includes('deposit') ? 'plus-circle' : 'minus-circle'} text-2xl"></i>
            </div>
            <div>
              <p class="text-xl font-bold text-white">${t.type === 'deposit_approved' ? 'Depozit Təsdiq' : t.type}</p>
              <p class="text-lg text-gray-400">${t.userId || 'Sistem'}</p>
            </div>
          </div>
          <div class="text-right">
            <div class="text-2xl font-black ${t.status === 'success' ? 'text-emerald-400' : 'text-red-400'}">
              ${t.amount ? `±${t.amount.toLocaleString()} AZN` : '0 AZN'}
            </div>
            <div class="text-sm text-gray-500">${t.date}</div>
          </div>
        </div>
      `).join('') || '<p class="text-center py-12 text-gray-500 text-xl">Tranzaksiya yoxdur</p>';
    }

    // Sayfa yüklənəndə
    if (localStorage.getItem('adminLoggedIn')) {
      document.getElementById('loginScreen').classList.add('hidden');
      document.getElementById('adminDashboard').classList.remove('hidden');
      sessionStart = Date.now();
      setInterval(updateSessionTime, 1000);
      loadDashboardData();
    }

    // Enter ilə giriş
    document.getElementById('adminPassword').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') checkAdminLogin();
    });

    // Escape ilə çıxış
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') logout();
    });
  </script>
</body>
</html>
