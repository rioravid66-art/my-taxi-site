<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CarBet - Depozit</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    .gradient-text { 
      background: linear-gradient(135deg, #10b981 0%, #34d399 50%, #6ee7b7 100%); 
      -webkit-background-clip: text; 
      -webkit-text-fill-color: transparent; 
      background-clip: text; 
    }
    .glass { 
      backdrop-filter: blur(25px); 
      background: rgba(15, 23, 42, 0.95); 
      border: 1px solid rgba(16, 185, 129, 0.3); 
    }
  </style>
</head>
<body class="bg-gradient-to-br from-gray-900 via-black to-gray-900 min-h-screen">

  <!-- Navigation (eyni qalır) -->
  <nav class="fixed top-0 left-0 right-0 bg-black/95 backdrop-blur-2xl z-50 border-b border-emerald-500/40 py-4 px-4 lg:px-8">
    <div class="max-w-4xl mx-auto flex items-center justify-between">
      <a href="index.html" class="flex items-center space-x-3">
        <div class="w-12 h-12 bg-gradient-to-r from-emerald-500 to-teal-600 rounded-2xl flex items-center justify-center shadow-2xl">
          <i class="fas fa-car text-2xl text-white"></i>
        </div>
        <div>
          <h1 class="text-2xl font-black gradient-text">CarBet</h1>
          <p class="text-xs text-emerald-400 font-semibold">Taksi Investisiyası</p>
        </div>
      </a>
      <div class="flex items-center space-x-4">
        <div class="text-right">
          <div class="text-xs text-gray-400 uppercase tracking-wider">Balans</div>
          <div class="text-3xl font-black text-emerald-400" id="currentBalance">0.00 AZN</div>
        </div>
        <a href="admin.html" class="bg-gradient-to-r from-red-500 to-pink-600 hover:from-red-600 hover:to-pink-700 text-white font-bold px-6 py-3 rounded-2xl shadow-2xl hover:shadow-red-500/50 transition-all">
          🔧 Admin
        </a>
      </div>
    </div>
  </nav>

  <div class="pt-24 pb-12 px-4 max-w-2xl mx-auto">
    
    <!-- Cari Balans -->
    <div class="glass rounded-3xl p-8 text-center mb-12">
      <div class="text-6xl font-black text-emerald-400 mb-4" id="currentBalanceDisplay">0.00</div>
      <div class="text-2xl font-bold text-gray-300">Cari Balans</div>
      <div class="text-sm text-emerald-400 mt-2 font-semibold">AZN</div>
    </div>

    <!-- Pending Status Modal -->
    <div id="pendingModal" class="fixed inset-0 bg-black/90 backdrop-blur-2xl z-[1000] hidden flex items-center justify-center p-4">
      <div class="glass rounded-4xl p-12 max-w-md w-full text-center max-h-[90vh] overflow-y-auto">
        <div class="w-28 h-28 bg-gradient-to-r from-yellow-500 to-orange-500 rounded-4xl flex items-center justify-center mx-auto mb-8 shadow-2xl animate-pulse">
          <i class="fas fa-clock text-4xl text-white"></i>
        </div>
        <h2 class="text-4xl font-black text-yellow-400 mb-6 leading-tight">⏳ Gözləyin...</h2>
        <div class="text-6xl font-bold text-yellow-400 mb-6 animate-pulse" id="countdown">60</div>
        <div class="bg-yellow-500/20 p-8 rounded-3xl mb-10 border-4 border-yellow-500/40">
          <div class="text-4xl font-black text-yellow-300 mb-4" id="amountPending">500</div>
          <div class="text-2xl font-bold text-white">AZN depozit təsdiqlənir</div>
        </div>
        <p class="text-xl text-yellow-200 mb-12 leading-relaxed">
          Admin təsdiq edəndə balansınıza avtomatik əlavə olunacaq
        </p>
        <div class="flex space-x-4">
          <a href="index.html" class="flex-1 bg-gradient-to-r from-gray-600 to-gray-700 hover:from-gray-700 hover:to-gray-800 text-white font-bold py-4 px-8 rounded-3xl shadow-xl hover:shadow-gray-500/50 transition-all text-lg">
            <i class="fas fa-home mr-2"></i>Ana səhifə
          </a>
          <button onclick="cancelPending()" class="flex-1 border-3 border-yellow-500 hover:bg-yellow-500 text-yellow-400 hover:text-white font-bold py-4 px-8 rounded-3xl shadow-2xl hover:shadow-yellow-500/50 transition-all text-lg">
            <i class="fas fa-times mr-2"></i>İmtina
          </button>
        </div>
      </div>
    </div>

    <!-- Deposit Buttons -->
    <div class="grid grid-cols-2 gap-6 mb-12">
      <button onclick="pendingDeposit(100)" class="glass p-8 rounded-3xl hover:bg-emerald-500/20 border-2 border-emerald-500/50 hover:border-emerald-500 hover:shadow-emerald-500/30 transition-all text-left group">
        <div class="text-4xl font-black text-emerald-400 group-hover:text-emerald-300 mb-4">₼ 100</div>
        <div class="text-xl font-bold text-white group-hover:text-emerald-300">Depozit</div>
        <i class="fas fa-plus-circle text-2xl text-emerald-400 ml-auto group-hover:text-emerald-300"></i>
      </button>
      
      <button onclick="pendingDeposit(500)" class="glass p-8 rounded-3xl hover:bg-blue-500/20 border-2 border-blue-500/50 hover:border-blue-500 hover:shadow-blue-500/30 transition-all text-left group">
        <div class="text-4xl font-black text-blue-400 group-hover:text-blue-300 mb-4">₼ 500</div>
        <div class="text-xl font-bold text-white group-hover:text-blue-300">Depozit</div>
        <i class="fas fa-plus-circle text-2xl text-blue-400 ml-auto group-hover:text-blue-300"></i>
      </button>
      
      <button onclick="pendingDeposit(1000)" class="glass p-8 rounded-3xl hover:bg-purple-500/20 border-2 border-purple-500/50 hover:border-purple-500 hover:shadow-purple-500/30 transition-all text-left group">
        <div class="text-4xl font-black text-purple-400 group-hover:text-purple-300 mb-4">₼ 1,000</div>
        <div class="text-xl font-bold text-white group-hover:text-purple-300">Depozit</div>
        <i class="fas fa-plus-circle text-2xl text-purple-400 ml-auto group-hover:text-purple-300"></i>
      </button>
      
      <button onclick="pendingDeposit(5000)" class="glass p-8 rounded-3xl hover:bg-pink-500/20 border-2 border-pink-500/50 hover:border-pink-500 hover:shadow-pink-500/30 transition-all text-left group">
        <div class="text-4xl font-black text-pink-400 group-hover:text-pink-300 mb-4">₼ 5,000</div>
        <div class="text-xl font-bold text-white group-hover:text-pink-300">Depozit</div>
        <i class="fas fa-plus-circle text-2xl text-pink-400 ml-auto group-hover:text-pink-300"></i>
      </button>
    </div>

    <!-- Öz مبلغ daxil et -->
    <div class="glass p-8 rounded-3xl text-center mb-12">
      <h3 class="text-2xl font-bold text-white mb-6">Və ya öz مبلغunuzu daxil edin</h3>
      <div class="flex items-center space-x-4 p-6 bg-zinc-900/50 rounded-2xl">
        <input type="number" id="customAmount" min="10" max="50000" placeholder="Məbləği yazın..." 
               class="flex-1 bg-transparent border-0 text-3xl font-bold text-white text-center focus:outline-none">
        <div class="text-2xl font-bold text-emerald-400">AZN</div>
      </div>
      <button onclick="pendingCustomDeposit()" class="mt-6 w-full bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-600 hover:to-teal-700 text-white font-black py-6 px-12 rounded-3xl shadow-2xl hover:shadow-emerald-500/50 transition-all text-xl">
        <i class="fas fa-credit-card mr-3"></i>Depozit et
      </button>
    </div>

    <!-- Admin Link -->
    <div class="text-center">
      <a href="admin.html" class="inline-flex items-center space-x-2 bg-gradient-to-r from-red-500 to-pink-600 hover:from-red-600 hover:to-pink-700 text-white font-bold py-4 px-12 rounded-3xl shadow-2xl hover:shadow-red-500/50 transition-all text-xl">
        <i class="fas fa-cog"></i>
        <span>🔧 Admin Panel</span>
      </a>
    </div>
  </div>

  <script>
    // 🔥 SAYFA YÜKLƏNƏNDƏ BALANSI GÖSTƏR (YALNIZ TƏSDİQLƏNMIŞ!)
    window.addEventListener('load', function() {
      const balance = parseFloat(localStorage.getItem('balance')) || 0;
      document.getElementById('currentBalance').textContent = balance.toFixed(2);
      document.getElementById('currentBalanceDisplay').textContent = balance.toLocaleString();
    });

    // 🔥 PENDING DEPOZİT BAŞLAT (60 saniyə sayım)
    function pendingDeposit(amount) {
      const depositId = Date.now() + Math.random().toString(36).substr(2, 9);
      const userId = localStorage.getItem('userId') || 'guest_' + Math.random().toString(36).substr(2, 9);
      
      // Pending array-ə əlavə et
      const pendingDeposits = JSON.parse(localStorage.getItem('pendingDeposits')) || [];
      pendingDeposits.unshift({
        id: depositId,
        amount: amount,
        userId: userId,
        status: 'pending',
        timestamp: Date.now()
      });
      localStorage.setItem('pendingDeposits', JSON.stringify(pendingDeposits));
      
      // Modal aç + 60s sayım
      showPendingModal(amount, depositId);
    }

    function pendingCustomDeposit() {
      const amount = parseFloat(document.getElementById('customAmount').value);
      if (!amount || amount < 10 || amount > 50000) {
        alert('❌ Məbləğ 10-50,000 AZN arasında olmalıdır!');
        return;
      }
      document.getElementById('customAmount').value = '';
      pendingDeposit(amount);
    }

    // 🔥 60 SANİYYƏ SAYIM MODAL
    function showPendingModal(amount, depositId) {
      document.getElementById('amountPending').textContent = amount.toLocaleString();
      document.getElementById('pendingModal').classList.remove('hidden');
      
      let timeLeft = 60;
      const countdownEl = document.getElementById('countdown');
      
      const interval = setInterval(() => {
        timeLeft--;
        countdownEl.textContent = timeLeft;
        countdownEl.style.transform = `scale(${1 + (60-timeLeft)/600})`;
        
        if (timeLeft <= 0) {
          clearInterval(interval);
          // 60 saniyə bitdi – hələ də admin təsdiqi gözləyir
        }
      }, 1000);
    }

    // 🔥 İMTİNA ET (Pending sil)
    function cancelPending() {
      // Son pending-i sil (test üçün)
      let pendingDeposits = JSON.parse(localStorage.getItem('pendingDeposits')) || [];
      if (pendingDeposits.length > 0) {
        pendingDeposits.pop();
        localStorage.setItem('pendingDeposits', JSON.stringify(pendingDeposits));
      }
      document.getElementById('pendingModal').classList.add('hidden');
      document.body.style.overflow = '';
    }

    // ESC ilə bağla
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' && !document.getElementById('pendingModal').classList.contains('hidden')) {
        cancelPending();
      }
    });

    // Modal dışına click
    document.getElementById('pendingModal').addEventListener('click', function(e) {
      if (e.target === this) cancelPending();
    });
  </script>
</body>
</html>
