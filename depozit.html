<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CarBet - Depozit</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    .gradient-text { 
      background: linear-gradient(135deg, #10b981 0%, #34d399 50%, #6ee7b7 100%); 
      -webkit-background-clip: text; 
      -webkit-text-fill-color: transparent; 
    }
    .glass { 
      backdrop-filter: blur(20px); 
      background: rgba(15, 23, 42, 0.95); 
      border: 1px solid rgba(16, 185, 129, 0.3); 
    }
    .m10-card {
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a855f7 100%);
      border: 3px solid #c084fc;
    }
  </style>
</head>
<body class="bg-gradient-to-br from-gray-900 via-black to-gray-900 min-h-screen p-4">

  <!-- Navigation -->
  <nav class="fixed top-0 left-0 right-0 bg-black/95 backdrop-blur-xl z-50 border-b border-emerald-500/40 py-3 px-4">
    <div class="max-w-2xl mx-auto flex items-center justify-between">
      <a href="index.html" class="flex items-center space-x-2">
        <div class="w-10 h-10 bg-gradient-to-r from-emerald-500 to-teal-600 rounded-xl flex items-center justify-center">
          <i class="fas fa-car text-xl text-white"></i>
        </div>
        <div>
          <h1 class="text-lg font-black gradient-text">CarBet</h1>
          <p class="text-xs text-emerald-400">Taksi Investisiyası</p>
        </div>
      </a>
      <a href="index.html" class="text-emerald-400 hover:text-emerald-300 text-lg">
        <i class="fas fa-home"></i>
      </a>
    </div>
  </nav>

  <div class="pt-20 pb-12 max-w-md mx-auto">
    
    <!-- BALANS -->
    <div class="glass rounded-3xl p-6 text-center mb-8">
      <div class="text-xs text-gray-400 uppercase tracking-wider mb-2">Balans</div>
      <div class="text-4xl font-black text-emerald-400 mb-2" id="currentBalance">0.00</div>
      <div class="text-lg font-bold text-emerald-400">AZN</div>
    </div>

    <!-- M10 ÖDƏNİŞ (YALNIZ BİR!) -->
    <div class="m10-card rounded-3xl p-8 text-center mb-8 cursor-pointer hover:shadow-purple-500/50 transition-all" onclick="showAmountModal()">
      <div class="w-20 h-20 bg-white/20 rounded-2xl flex items-center justify-center mx-auto mb-6">
        <i class="fas fa-wallet text-3xl text-white"></i>
      </div>
      <h3 class="text-3xl font-black text-white mb-4">m10 Ödəniş</h3>
      <p class="text-lg text-indigo-100 mb-6">077 765 22 12</p>
      <div class="bg-white/20 px-6 py-3 rounded-2xl text-xl font-bold text-white">
        Məbləğ seç
      </div>
    </div>

    <!-- MƏBLƏĞ SEÇİMİ -->
    <div class="glass p-6 rounded-3xl mb-8 text-center">
      <h3 class="text-2xl font-black text-white mb-6">Məbləğ (Min: 20 AZN)</h3>
      <div class="grid grid-cols-2 gap-4 mb-6">
        <button onclick="selectAmount(20)" class="bg-emerald-500/20 hover:bg-emerald-500/40 p-4 rounded-2xl font-bold text-xl text-emerald-400 border-2 border-emerald-500/50 transition-all">₼20</button>
        <button onclick="selectAmount(50)" class="bg-blue-500/20 hover:bg-blue-500/40 p-4 rounded-2xl font-bold text-xl text-blue-400 border-2 border-blue-500/50 transition-all">₼50</button>
        <button onclick="selectAmount(100)" class="bg-purple-500/20 hover:bg-purple-500/40 p-4 rounded-2xl font-bold text-xl text-purple-400 border-2 border-purple-500/50 transition-all">₼100</button>
        <button onclick="selectAmount(500)" class="bg-emerald-600/30 hover:bg-emerald-600/50 p-4 rounded-2xl font-bold text-xl text-emerald-300 border-2 border-emerald-600/60 transition-all">₼500</button>
      </div>
      <input type="number" id="customAmount" min="20" max="1000000" step="10" 
             class="w-full bg-zinc-900/50 px-6 py-4 text-2xl font-bold text-white text-center rounded-2xl border-2 border-gray-600 focus:border-emerald-500 focus:outline-none"
             placeholder="Öz məbləğ...">
    </div>

    <!-- ÖDƏ BUTON -->
    <button onclick="confirmPayment()" 
            class="w-full bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-600 hover:to-teal-700 text-white font-black py-6 px-8 rounded-3xl shadow-2xl hover:shadow-emerald-500/50 text-xl transition-all mb-8"
            id="payButton" disabled>
      <i class="fas fa-credit-card mr-2"></i>m10 ilə Ödə
    </button>
  </div>

  <!-- MƏBLƏĞ MODAL -->
  <div id="amountModal" class="fixed inset-0 bg-black/90 backdrop-blur-xl z-[1000] hidden flex items-center justify-center p-4">
    <div class="glass rounded-3xl p-8 max-w-sm w-full text-center">
      <div class="w-24 h-24 bg-gradient-to-r from-emerald-500 to-teal-600 rounded-3xl mx-auto mb-8 flex items-center justify-center shadow-2xl">
        <i class="fas fa-phone text-4xl text-white"></i>
      </div>
      <h2 class="text-3xl font-black text-emerald-400 mb-6">077 765 22 12</h2>
      <p class="text-xl text-white mb-8">Bu məbləği m10 ilə göndərin:</p>
      <div class="bg-emerald-500/30 p-6 rounded-2xl mb-8 border-2 border-emerald-500/50">
        <div class="text-4xl font-black text-emerald-300 mb-2" id="modalAmount">20</div>
        <div class="text-lg font-bold text-white">AZN</div>
      </div>
      <button onclick="startCountdown()" class="w-full bg-gradient-to-r from-emerald-500 to-teal-600 text-white font-black py-5 px-8 rounded-2xl shadow-2xl hover:shadow-emerald-500/50 text-xl mb-4">
        Göndərilib - Təsdiq gözlə
      </button>
      <button onclick="closeAmountModal()" class="w-full border-2 border-gray-500 hover:bg-gray-500 text-gray-300 hover:text-white font-bold py-5 px-8 rounded-2xl shadow-2xl text-lg">
        İmtina
      </button>
    </div>
  </div>

  <!-- GƏRİ SAYIM MODAL -->
  <div id="countdownModal" class="fixed inset-0 bg-black/95 backdrop-blur-xl z-[1001] hidden flex items-center justify-center p-4">
    <div class="glass rounded-3xl p-8 max-w-sm w-full text-center">
      <div class="w-24 h-24 bg-gradient-to-r from-yellow-500 to-orange-500 rounded-3xl mx-auto mb-8 flex items-center justify-center shadow-2xl animate-pulse">
        <i class="fas fa-clock text-4xl text-white"></i>
      </div>
      <h2 class="text-3xl font-black text-yellow-400 mb-4">Təsdiqlənir...</h2>
      <div class="text-6xl font-black text-yellow-400 mb-8 animate-pulse" id="countdown">60</div>
      <div class="bg-yellow-500/30 p-6 rounded-2xl mb-8 border-2 border-yellow-500/50">
        <div class="text-3xl font-black text-yellow-300 mb-2" id="countdownAmount">20</div>
        <div class="text-lg text-white">AZN (077 765 22 12)</div>
      </div>
      <a href="index.html" class="block w-full bg-gradient-to-r from-gray-700 to-gray-800 text-white font-bold py-4 px-8 rounded-2xl shadow-2xl text-xl">Ana səhifə</a>
    </div>
  </div>

  <script>
    let selectedAmount = 0;
    let countdownTimer = null;

    // BALANS
    window.onload = function() {
      const balance = parseFloat(localStorage.getItem('balance')) || 0;
      document.getElementById('currentBalance').textContent = balance.toLocaleString();
    };

    // MƏBLƏĞ SEÇ
    function selectAmount(amount) {
      selectedAmount = amount;
      document.getElementById('payButton').disabled = false;
      document.getElementById('payButton').classList.remove('opacity-50');
      document.querySelectorAll('[onclick^="selectAmount"]').forEach(btn => {
        btn.classList.remove('bg-emerald-500/40', 'ring-4', 'ring-emerald-500/50');
      });
      event.target.classList.add('bg-emerald-500/40', 'ring-4', 'ring-emerald-500/50');
    }

    // CUSTOM MƏBLƏĞ
    document.getElementById('customAmount').addEventListener('input', function() {
      const amount = parseFloat(this.value);
      if (amount >= 20) {
        selectedAmount = amount;
        document.getElementById('payButton').disabled = false;
        document.getElementById('payButton').classList.remove('opacity-50');
      }
    });

    // M10 MODAL
    function showAmountModal() {
      if (selectedAmount < 20) {
        alert('❌ Əvvəlcə məbləğ seçin!');
        return;
      }
      document.getElementById('modalAmount').textContent = selectedAmount;
      document.getElementById('amountModal').classList.remove('hidden');
      document.body.style.overflow = 'hidden';
    }

    // GƏRİ SAYIM BAŞLAT
    function startCountdown() {
      // PENDING ƏLAVƏ ET
      const depositId = Date.now();
      const pendingDeposits = JSON.parse(localStorage.getItem('pendingDeposits')) || [];
      pendingDeposits.unshift({
        id: depositId,
        amount: selectedAmount,
        method: 'm10',
        phone: '077 765 22 12',
        timestamp: Date.now(),
        status: 'pending'
      });
      localStorage.setItem('pendingDeposits', JSON.stringify(pendingDeposits));

      document.getElementById('amountModal').classList.add('hidden');
      document.getElementById('countdownAmount').textContent = selectedAmount;
      document.getElementById('countdownModal').classList.remove('hidden');
      
      let timeLeft = 60;
      const countdownEl = document.getElementById('countdown');
      countdownTimer = setInterval(() => {
        timeLeft--;
        countdownEl.textContent = timeLeft;
        if (timeLeft <= 0) {
          clearInterval(countdownTimer);
        }
      }, 1000);
    }

    // TƏSDİQ ET
    function confirmPayment() {
      showAmountModal();
    }

    // MODAL BAĞLA
    function closeAmountModal() {
      document.getElementById('amountModal').classList.add('hidden');
      document.body.style.overflow = '';
    }

    // ESC
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        document.getElementById('amountModal').classList.add('hidden');
        document.getElementById('countdownModal').classList.add('hidden');
        document.body.style.overflow = '';
        if (countdownTimer) clearInterval(countdownTimer);
      }
    });
  </script>
</body>
</html>
